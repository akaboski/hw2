[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "0"
    X-Content-Type-Options = "nosniff"
    Content-Security-Policy = "default-src 'self'; style-src 'self'; form-action 'self'; script-src 'self' 'unsafe-eval'; connect-src 'self'; img-src 'self'; base-uri 'self';"

[[headers]]
  for = "/src/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"

[[headers]]
  for = "/src/*.svelte"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/src/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"

[build]
  command = "npm ci && npm run build"
  publish = "dist"
